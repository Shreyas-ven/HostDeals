server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /login {
        proxy_pass http://backend:5000;
    }

    location /upload {
        proxy_pass http://backend:5000;
    }

    location /api/ {
        proxy_pass http://backend:5000/;
    }
}