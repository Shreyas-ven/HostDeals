name: Cloud Deploy (No Local Dependency)

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest   # ✅ GitHub cloud server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hostdeals-backend ./hostdeals-backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hostdeals-frontend ./hostdeals-frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hostdeals-backend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hostdeals-frontend