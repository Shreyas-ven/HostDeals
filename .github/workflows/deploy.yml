name: Deploy to Minikube

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Minikube Docker Env
        shell: powershell
        run: |
            $envs = minikube docker-env --shell powershell
            Invoke-Expression $envs
            docker info

      - name: Build Backend Image
        run: docker build -t hostdeals-backend ./hostdeals-backend

      - name: Build Frontend Image
        run: docker build -t hostdeals-frontend ./hostdeals-frontend

      - name: Apply Kubernetes configs
        run: |
          kubectl apply -f backend-deployment.yaml
          kubectl apply -f backend-service.yaml
          kubectl apply -f frontend-deployment.yaml
          kubectl apply -f frontend-service.yaml
          kubectl apply -f ingress.yaml

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment backend
          kubectl rollout restart deployment frontend